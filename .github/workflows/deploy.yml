# Builds and deploys the full stack (backend + frontend) on push to any environment branch
name: Build & Deploy

on:
  push:
    branches: [dev, qa, main] # Triggers deployment to the matching GitHub environment

permissions:
  id-token: write # Required for AWS OIDC authentication (no static keys needed)
  contents: read # Required for actions/checkout to clone the repo

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name }} # Display name in GitHub Actions UI (e.g. "Deploy to dev")
    runs-on: ubuntu-latest # Uses GitHub-hosted Ubuntu runner
    environment: ${{ github.ref_name }} # Loads vars/secrets from the matching GitHub environment (dev, qa, or main)

    steps:
      # Clone the repository into the runner
      - name: Checkout
        uses: actions/checkout@v4

      # Install Node.js and cache npm dependencies from both frontend and backend lockfiles
      # to speed up subsequent runs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ── AWS Authentication (needed for SAM deploy, S3 sync, and CloudFront invalidation) ──

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── Deploy Backend (SAM) ──
      # Backend is deployed first so the API URL can be injected into the frontend build.

      # Install backend Node.js dependencies (clean install from lockfile)
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # Install the AWS SAM CLI for building and deploying the serverless backend
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      # Validate the SAM template syntax
      - name: Validate SAM template
        run: sam validate --template template.yaml --region ${{ vars.AWS_REGION }}
        working-directory: backend

      # Build the SAM application — compiles Lambda functions and resolves dependencies
      # Adds node_modules/.bin to PATH so SAM can find locally installed tools (e.g. esbuild)
      - name: Build SAM application
        run: sam build
        working-directory: backend
        env:
          PATH: ${{ github.workspace }}/backend/node_modules/.bin:$PATH

      # Deploy the SAM stack to AWS CloudFormation
      # --s3-bucket: S3 bucket where SAM uploads packaged Lambda code before deploying
      # --capabilities CAPABILITY_IAM: allows CloudFormation to create/modify IAM roles
      # --no-confirm-changeset: auto-approve changes without prompting
      # --no-fail-on-empty-changeset: don't fail if nothing changed
      # --parameter-overrides: passes the allowed CORS origin into the SAM template
      - name: Deploy SAM stack
        run: |
          sam deploy \
            --stack-name ${{ vars.SAM_STACK_NAME }} \
            --s3-bucket ${{ vars.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region ${{ vars.AWS_REGION }} \
            --parameter-overrides AllowedOrigin=${{ vars.ALLOWED_ORIGIN }}
        working-directory: backend

      # Query the deployed CloudFormation stack for the API Gateway URL
      # and save it as a step output so the frontend build can use it
      - name: Get API URL from stack outputs
        id: stack-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ vars.SAM_STACK_NAME }} \
            --region ${{ vars.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "✓ API URL resolved from stack: ${API_URL}"

      # ── Build & Deploy Frontend ──
      # Angular's fileReplacements in angular.json swaps in the correct environment file
      # based on the build configuration (dev, qa, or main), matching the branch name.
      # The API URL placeholder is then replaced with the real deployed API Gateway URL.

      # Install frontend Node.js dependencies (clean install from lockfile)
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Replace the API URL placeholder in the target environment file with the real value
      - name: Inject API URL into environment config
        run: sed -i "s|__API_BASE_URL__|${API_URL}|g" src/environments/environment.${{ github.ref_name }}.ts
        working-directory: frontend
        env:
          API_URL: ${{ steps.stack-outputs.outputs.api_url }}

      # Build the Angular app using the branch name as the Angular configuration
      # e.g. dev branch → --configuration dev → uses environment.dev.ts
      - name: Build Angular app
        run: npm run build -- --configuration ${{ github.ref_name }}
        working-directory: frontend

      # Upload the built Angular app to S3, removing old files (--delete)
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/frontend/browser/ \
            s3://${{ vars.S3_BUCKET_NAME }}/ \
            --delete

      # Clear the CDN cache so users get the latest version immediately
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
