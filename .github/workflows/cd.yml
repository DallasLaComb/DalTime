# Deploys the full stack (backend + frontend) to dev, qa, and main.
# After a successful deploy, runs Robot Framework E2E tests.
#
# Flow:
#   push to dev → CD starts, polls until CI succeeds on that commit → deploys to dev → E2E
#   PR dev→qa merged → CD finds last successful dev CI artifact → deploys to qa → E2E
#   PR qa→main merged → CD finds last successful qa CD artifact → deploys to main → E2E
#
# CI only runs on dev. QA promotes from the last successful dev CI run.
# Main promotes from the last successful qa CD run (the artifact qa was actually deployed with).
# Each environment uses its own AWS role and stack.
name: CD
run-name: "CD — ${{ github.ref_name }}"

on:
  push:
    branches: [dev, qa, main]

# Cancel any in-progress CD run for the same branch when a new push arrives.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  actions: read
  deployments: write
  statuses: write

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      BRANCH: ${{ github.ref_name }}

    environment: ${{ github.ref_name }}

    steps:
      # ── Resolve which run to pull artifacts from ──
      #
      # dev:  poll until CI succeeds on this exact commit, then use that run's artifacts.
      # qa:   the last successful CI run on dev — CI artifacts are what gets promoted to qa.
      # main: the last successful CD run on qa — whatever was actually deployed to qa
      #       is what gets promoted to main, ensuring main always gets qa-verified code.
      - name: Resolve artifact run ID
        id: ci-run
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // ── dev: poll until CI completes on this exact commit ──
            if (branch === 'dev') {
              const sha = context.sha;
              console.log(`Dev — waiting for CI to complete on ${sha}...`);

              for (let attempt = 0; attempt < 60; attempt++) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'ci.yml',
                  head_sha: sha,
                  per_page: 1
                });

                if (runs.data.workflow_runs.length > 0) {
                  const run = runs.data.workflow_runs[0];
                  if (run.conclusion === 'success') {
                    console.log(`✓ Dev — CI succeeded: ${run.id} (${sha})`);
                    core.setOutput('run_id', run.id);
                    core.setOutput('sha', sha);
                    return;
                  } else if (run.conclusion) {
                    core.setFailed(`CI ended with: ${run.conclusion}`);
                    return;
                  }
                  console.log(`Attempt ${attempt + 1}/60 — CI ${run.status}, waiting 10s...`);
                } else {
                  console.log(`Attempt ${attempt + 1}/60 — no CI run found yet, waiting 10s...`);
                }

                await new Promise(r => setTimeout(r, 10000));
              }

              core.setFailed('Timed out waiting for CI to complete (10 min)');
              return;
            }

            // ── qa: find the last successful CI run on dev ──
            if (branch === 'qa') {
              console.log('QA promotion — finding last successful CI run on dev...');

              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                branch: 'dev',
                status: 'success',
                per_page: 1
              });

              if (!runs.data.workflow_runs.length) {
                core.setFailed('No successful CI runs found on dev. Deploy to dev first.');
                return;
              }

              const run = runs.data.workflow_runs[0];
              console.log(`✓ QA — using last successful dev CI run: ${run.id} (${run.head_sha})`);
              core.setOutput('run_id', run.id);
              core.setOutput('sha', run.head_sha);
              return;
            }

            // ── main: find the last successful CD run on qa ──
            // This ensures main gets exactly what was deployed and verified on qa,
            // not just the last CI build — it's the qa-tested artifact.
            if (branch === 'main') {
              console.log('Main promotion — finding last successful CD run on qa...');

              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'cd.yml',
                branch: 'qa',
                status: 'success',
                per_page: 1
              });

              if (!runs.data.workflow_runs.length) {
                core.setFailed('No successful CD runs found on qa. Deploy to qa first.');
                return;
              }

              const qaRun = runs.data.workflow_runs[0];
              console.log(`✓ Found last successful qa CD run: ${qaRun.id} (${qaRun.head_sha})`);

              // The qa CD run itself doesn't have artifacts — it downloaded them from a CI run.
              // We need to find which CI run it used. The qa CD run's head_sha is the qa merge
              // commit sha. We walk back to find the CI run on dev whose artifacts qa used,
              // which is the most recent successful CI run on dev at the time qa was deployed.
              // The simplest reliable approach: find the CI run on dev whose sha matches
              // one of the parents of the qa merge commit that triggered the qa CD run.
              const qaCommit = await github.rest.git.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: qaRun.head_sha
              });

              const parentShas = qaCommit.data.parents.map(p => p.sha);
              console.log(`QA merge commit parents: ${parentShas.join(', ')}`);

              const ciRuns = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                branch: 'dev',
                status: 'success',
                per_page: 20
              });

              // Match on parent shas — parent[1] of the qa merge commit is the dev HEAD
              const shasToCheck = [qaRun.head_sha, ...parentShas];
              let ciRun = ciRuns.data.workflow_runs.find(r => shasToCheck.includes(r.head_sha));

              // Fallback: if no sha match (e.g. multiple merges since), use the most recent
              // successful CI run on dev — same artifact qa would have used
              if (!ciRun) {
                console.log('No sha match found — falling back to most recent successful dev CI run');
                ciRun = ciRuns.data.workflow_runs[0];
              }

              if (!ciRun) {
                core.setFailed('No successful CI runs found on dev. Deploy to dev and qa first.');
                return;
              }

              console.log(`✓ Main — using CI run: ${ciRun.id} (${ciRun.head_sha})`);
              core.setOutput('run_id', ciRun.id);
              core.setOutput('sha', ciRun.head_sha);
            }

      # Clone the exact commit that was built and tested in CI
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.ci-run.outputs.sha }}

      # ── AWS Authentication ──
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ── Deploy Backend (SAM) ──
      - name: Download SAM build artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: backend/.aws-sam/build/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.ci-run.outputs.run_id }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Get foundation stack outputs
        id: foundation
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name daltime-foundation-${BRANCH} \
            --region us-east-1 \
            --query "Stacks[0].Outputs" \
            --output json)

          get() { echo "$OUTPUTS" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'; }

          echo "bucket_name=$(get BucketName)"             >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(get DistributionId)"     >> "$GITHUB_OUTPUT"
          echo "user_pool_id=$(get UserPoolId)"             >> "$GITHUB_OUTPUT"
          echo "client_id=$(get UserPoolClientId)"          >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(get CognitoDomain)"        >> "$GITHUB_OUTPUT"
          echo "cognito_region=$(get CognitoRegion)"        >> "$GITHUB_OUTPUT"

          echo "✓ Foundation outputs resolved for daltime-foundation-${BRANCH}"

      - name: Deploy SAM stack
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name ${{ vars.SAM_STACK_NAME }} \
            --s3-bucket ${{ vars.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region us-east-1 \
            --parameter-overrides \
              AllowedOrigins=${{ vars.ALLOWED_ORIGINS }} \
              CognitoUserPoolId=${{ steps.foundation.outputs.user_pool_id }} \
              CognitoClientId=${{ steps.foundation.outputs.client_id }}
        working-directory: backend

      - name: Get API URL from stack outputs
        id: stack-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ vars.SAM_STACK_NAME }} \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "✓ API URL resolved from stack: ${API_URL}"

      # ── Deploy Frontend ──
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/frontend/browser/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.ci-run.outputs.run_id }}

      - name: Replace environment placeholders
        env:
          API_BASE_URL: ${{ steps.stack-outputs.outputs.api_url }}
          COGNITO_USER_POOL_ID: ${{ steps.foundation.outputs.user_pool_id }}
          COGNITO_CLIENT_ID: ${{ steps.foundation.outputs.client_id }}
          COGNITO_REGION: ${{ steps.foundation.outputs.cognito_region }}
          COGNITO_DOMAIN: ${{ steps.foundation.outputs.cognito_domain }}
        run: |
          find frontend/dist/frontend/browser \( -name "*.html" -o -name "*.js" -o -name "*.txt" \) -type f -exec sed -i \
            -e "s|__API_BASE_URL__|${API_BASE_URL}|g" \
            -e "s|__VITE_COGNITO_USER_POOL_ID__|${COGNITO_USER_POOL_ID}|g" \
            -e "s|__VITE_COGNITO_CLIENT_ID__|${COGNITO_CLIENT_ID}|g" \
            -e "s|__VITE_COGNITO_REGION__|${COGNITO_REGION}|g" \
            -e "s|__VITE_COGNITO_DOMAIN__|${COGNITO_DOMAIN}|g" \
            {} +

          echo "✓ Placeholders replaced:"
          echo "  API_BASE_URL: ${API_BASE_URL}"
          echo "  COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:0:10}..."
          echo "  COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:0:10}..."
          echo "  COGNITO_REGION: ${COGNITO_REGION}"
          echo "  COGNITO_DOMAIN: ${COGNITO_DOMAIN}"

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/frontend/browser/ \
            s3://${{ steps.foundation.outputs.bucket_name }}/ \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.foundation.outputs.distribution_id }} \
            --paths "/*"

      - name: Report deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const deployRef = context.sha;

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: deployRef,
              environment: branch,
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: `https://github.com/${context.repo.owner}/${context.repo.repo}`,
              description: 'Deployment successful'
            });

  # ── E2E Tests ──
  e2e:
    name: E2E Tests (${{ github.ref_name }})
    needs: deploy
    if: github.ref_name == 'dev' || github.ref_name == 'qa'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    env:
      BRANCH: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v5.2.0
        with:
          python-version: "3.12"

      - name: Install Robot Framework
        run: |
          pip install -r robot/requirements.txt
          rfbrowser init

      - name: Resolve environment variables
        id: env
        run: |
          case "$BRANCH" in
            dev)
              echo "base_url=https://dev.daltime.com" >> "$GITHUB_OUTPUT"
              echo "web_admin_email=robot-dev@daltime.com" >> "$GITHUB_OUTPUT"
              echo "cognito_client_id=1nl13tbaqb47s8f0tfc07lc24m" >> "$GITHUB_OUTPUT"
              ;;
            qa)
              echo "base_url=https://qa.daltime.com" >> "$GITHUB_OUTPUT"
              echo "web_admin_email=robot-qa@daltime.com" >> "$GITHUB_OUTPUT"
              echo "cognito_client_id=4vqid36i5ggs8vreaeitsgiqj5" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run E2E tests
        run: |
          if [ -z "$E2E_PASSWORD" ]; then
            echo "ERROR: E2E_WEB_ADMIN_PASSWORD secret is not set for this environment"
            exit 1
          fi
          robot \
            --outputdir results \
            --variable BASE_URL:${{ steps.env.outputs.base_url }} \
            --variable WEB_ADMIN_EMAIL:${{ steps.env.outputs.web_admin_email }} \
            --variable "WEB_ADMIN_PASSWORD:${E2E_PASSWORD}" \
            --variable COGNITO_REGION:us-east-1 \
            --variable COGNITO_CLIENT_ID:${{ steps.env.outputs.cognito_client_id }} \
            --variable HEADLESS:true \
            --variable SLOW_MO:0ms \
            robot/tests/
        env:
          E2E_PASSWORD: ${{ secrets.E2E_WEB_ADMIN_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: robot-results-${{ github.ref_name }}
          path: results/
          retention-days: 14
