# Runs unit and integration tests for the frontend and backend.
# This is the first stage of the pipeline: push to dev → CI → Deploy to dev.
# CI only runs on dev. QA and main are promoted from the last successful dev CI artifact
# when a PR from dev→qa or qa→main is merged — no rebuild, no retest.
name: CI

on:
  push:
    branches: [dev]

permissions:
  contents: read
  security-events: write # Required for CodeQL to upload results to GitHub Security tab

# Frontend and backend jobs run in parallel for faster feedback.
# Both must pass for the workflow to succeed and trigger CD.
jobs:
  # ── Frontend Tests ──
  # Runs Angular unit tests via Vitest (configured in angular.json with @angular/build:unit-test)
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      # Clone the repository into the runner
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Install Node.js and cache npm dependencies to speed up subsequent runs
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Clean install from lockfile — ensures reproducible builds
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # Runs `ng test` which executes Vitest against all *.spec.ts files
      - name: Run unit tests
        run: npm test
        working-directory: frontend

      # Build the Angular app with placeholder values for environment-specific config.
      # CD will replace placeholders (e.g. __API_BASE_URL__, __VITE_COGNITO_*) with
      # real values from GitHub Actions variables when deploying to each environment.
      - name: Build Angular app
        run: npm run build
        working-directory: frontend

      # Upload the compiled Angular app so CD can deploy the exact build that passed tests.
      # This artifact is reused for dev, qa, and main — no rebuild happens on promotion.
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/frontend/browser/
          retention-days: 7

  # ── Backend Tests ──
  # Runs unit and integration tests for the Lambda-based backend.
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      # Clone the repository into the runner
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Install Node.js and cache npm dependencies to speed up subsequent runs
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Clean install from lockfile — ensures reproducible builds
      - name: Install dependencies
        run: npm ci
        working-directory: backend

      # Runs tests from backend/test/unit/ — fast, no external dependencies
      - name: Run unit tests
        run: npm test
        working-directory: backend

      # Runs tests from backend/test/integration/ — may use mocked or local AWS services
      - name: Run integration tests
        run: npm run test:integration
        working-directory: backend

      # Install the AWS SAM CLI for building the serverless backend
      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      # Build the SAM application — compiles Lambda functions and resolves dependencies.
      # Adds node_modules/.bin to PATH so SAM can find locally installed tools (e.g. esbuild).
      - name: Build SAM application
        run: sam build
        working-directory: backend
        env:
          PATH: ${{ github.workspace }}/backend/node_modules/.bin:$PATH

      # Upload the SAM build output so CD can deploy the exact build that passed tests.
      # This artifact is reused for dev, qa, and main — no rebuild happens on promotion.
      - name: Upload SAM build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: backend/.aws-sam/build/
          retention-days: 7

  # ── CodeQL Security Scan ──
  # Scans TypeScript/JavaScript for security vulnerabilities and code quality issues.
  # Results appear in the GitHub Security tab under Code Scanning.
  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3