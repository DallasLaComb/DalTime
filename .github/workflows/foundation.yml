# Deploys the foundation stack (S3, CloudFront, Cognito) to a single environment.
#
# Run this ONCE per environment before the first CD deploy.
# Re-run any time you change infra/foundation.yaml.
#
# Required GitHub environment variables per environment:
#   vars.AWS_REGION          — e.g. us-east-1
#   vars.CUSTOM_DOMAIN       — e.g. dev.daltime.com
#   vars.ACM_CERTIFICATE_ARN — ACM cert ARN in us-east-1
#   vars.FRONTEND_BUCKET_NAME — e.g. daltime-frontend-dev
#   vars.COGNITO_DOMAIN_PREFIX — e.g. daltime-dev
#   secrets.AWS_ROLE_ARN     — OIDC role ARN for this environment
name: Deploy Foundation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, main]
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-foundation:
    name: Deploy foundation to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Scan CloudFormation template (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          file: infra/foundation.yaml
          framework: cloudformation
          soft_fail: true
          # CKV_AWS_111: sns:Publish * is required for Cognito SMS (ARN is dynamic)
          # CKV_AWS_21:  S3 versioning adds cost with no value for a static site bucket
          # CKV_AWS_18:  S3 access logging requires a second bucket — overkill here
          # CKV_AWS_68:  CloudFront WAF costs per-request — not appropriate for this project
          # CKV_AWS_86:  CloudFront logging requires a second bucket — overkill here
          skip_check: CKV_AWS_111,CKV_AWS_21,CKV_AWS_18,CKV_AWS_68,CKV_AWS_86

      - name: Deploy foundation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/foundation.yaml \
            --stack-name daltime-foundation-${{ inputs.environment }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --region us-east-1 \
            --parameter-overrides \
              Environment=${{ inputs.environment }} \
              CustomDomain=${{ vars.CUSTOM_DOMAIN }} \
              AcmCertificateArn=${{ vars.ACM_CERTIFICATE_ARN }} \
              FrontendBucketName=${{ vars.FRONTEND_BUCKET_NAME }} \
              CognitoDomainPrefix=${{ vars.COGNITO_DOMAIN_PREFIX }} \
              CognitoUsernameAttributes=email \
              CognitoAutoVerifiedAttributes=email \
              CognitoAdminCreateUserOnly=true

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name daltime-foundation-${{ inputs.environment }} \
            --region us-east-1 \
            --query "Stacks[0].Outputs" \
            --output table
