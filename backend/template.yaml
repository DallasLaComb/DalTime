AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DalTime Scheduling Application Backend

Parameters:
  AllowedOrigin:
    Type: String
    Default: "http://localhost:4200"
    Description: "Frontend origin for CORS"
  CognitoUserPoolId:
    Type: String
    Default: "us-east-1_LVp3uUQ5l"
  CognitoClientId:
    Type: String
    Default: "1vvrr1dvepebrkl1v246pbijju"
  LambdaArchitecture:
    Type: String
    Default: arm64
    AllowedValues:
      - arm64
      - x86_64

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    Architectures:
      - !Ref LambdaArchitecture
    Environment:
      Variables:
        NODE_ENV: development
        ALLOWED_ORIGIN: !Ref AllowedOrigin

Resources:

  # Grants API Gateway permission to write to CloudWatch Logs at the account level.
  # This replaces the AWS::Logs::ResourcePolicy approach, which requires
  # logs:DescribeResourcePolicies — a permission not available to GitHub Actions OIDC roles
  # by default. The account-level role only needs to be set once per region, but
  # CloudFormation is idempotent so re-deploying is safe.
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # Registers the IAM role with API Gateway at the account level so all APIs
  # in this region can write access logs to CloudWatch.
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}/access-logs"
      RetentionInDays: 1

  OrganizationsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-OrganizationsFunction"
      RetentionInDays: 1

  DalTimeHttpApi:
    Type: AWS::Serverless::HttpApi
    DependsOn:
      - ApiGatewayAccount
    Properties:
      StageName: $default
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp",
          "method":"$context.httpMethod","path":"$context.path",
          "status":"$context.status","protocol":"$context.protocol",
          "responseLength":"$context.responseLength",
          "integrationError":"$context.integrationErrorMessage",
          "error":"$context.error.message",
          "integrationStatus":"$context.integration.integrationStatus"}
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"
              audience:
                - !Ref CognitoClientId
            IdentitySource: "$request.header.Authorization"
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 300

  DalTimeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "daltime-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OrganizationsFunction:
    Type: AWS::Serverless::Function
    DependsOn: OrganizationsFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-OrganizationsFunction"
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AWS::StackName}-OrganizationsFunction"
      CodeUri: .
      Handler: src/functions/web-admin/organizations/main.handler
      Events:
        ListOrganizations:
          Type: HttpApi
          Properties:
            Path: /organizations
            Method: GET
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        CreateOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations
            Method: POST
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        GetOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: GET
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        UpdateOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: PUT
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        DeleteOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: DELETE
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        OptionsOrganizations:
          Type: HttpApi
          Properties:
            Path: /organizations
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        OptionsOrganizationById:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          TABLE_NAME: !Ref DalTimeTable
          DYNAMODB_ENDPOINT: ""
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DalTimeTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/web-admin/organizations/main.ts
        Format: esm
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        External:
          - "@aws-sdk/*"

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${DalTimeHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  OrganizationsEndpoint:
    Value: !Sub "https://${DalTimeHttpApi}.execute-api.${AWS::Region}.amazonaws.com/organizations"
  OrganizationsFunction:
    Value: !GetAtt OrganizationsFunction.Arn
  DalTimeTable:
    Value: !Ref DalTimeTable