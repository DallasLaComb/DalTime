AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DalTime Scheduling Application Backend

Parameters:
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "http://localhost:4200"
    Description: "Comma-separated frontend origins for CORS"
  CognitoUserPoolId:
    Type: String
    Default: "us-east-1_LVp3uUQ5l"
  CognitoClientId:
    Type: String
    Default: "1vvrr1dvepebrkl1v246pbijju"
  LambdaArchitecture:
    Type: String
    Default: arm64
    AllowedValues:
      - arm64
      - x86_64

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    Architectures:
      - !Ref LambdaArchitecture
    Environment:
      Variables:
        NODE_ENV: development
        ALLOWED_ORIGINS: !Join [",", !Ref AllowedOrigins]
        TABLE_NAME: !Ref DalTimeTable

Resources:

  # Access log group for the HTTP API (API Gateway V2).
  # API Gateway V2 does not use the account-level CloudWatch role (that's V1 only).
  # Instead, we grant the delivery.logs service principal write access via a
  # resource-based policy directly on the log group.
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}/access-logs"
      RetentionInDays: 1

  ApiAccessLogGroupPolicy:
    Type: AWS::Logs::ResourcePolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-apigw-access-log-policy"
      PolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "AllowApiGatewayV2Logging",
              "Effect": "Allow",
              "Principal": {
                "Service": "delivery.logs.amazonaws.com"
              },
              "Action": [
                "logs:CreateLogStream",
                "logs:PutLogEvents"
              ],
              "Resource": "${ApiAccessLogGroup.Arn}:*",
              "Condition": {
                "StringEquals": {
                  "aws:SourceAccount": "${AWS::AccountId}"
                }
              }
            }
          ]
        }

  OrgAdminsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-OrgAdminsFunction"
      RetentionInDays: 1

  ManagersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-ManagersFunction"
      RetentionInDays: 1

  OrganizationsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-OrganizationsFunction"
      RetentionInDays: 1

  DalTimeHttpApi:
    Type: AWS::Serverless::HttpApi
    DependsOn: ApiAccessLogGroupPolicy
    Properties:
      StageName: $default
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp",
          "method":"$context.httpMethod","path":"$context.path",
          "status":"$context.status","protocol":"$context.protocol",
          "responseLength":"$context.responseLength",
          "integrationError":"$context.integrationErrorMessage",
          "error":"$context.error.message",
          "integrationStatus":"$context.integration.integrationStatus"}
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"
              audience:
                - !Ref CognitoClientId
            IdentitySource: "$request.header.Authorization"
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 300

  DalTimeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "daltime-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OrgAdminsFunction:
    Type: AWS::Serverless::Function
    DependsOn: OrgAdminsFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-OrgAdminsFunction"
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AWS::StackName}-OrgAdminsFunction"
      CodeUri: ../backend
      Handler: src/functions/web-admin/org-admins/handler.handler
      Events:
        ListOrgAdmins:
          Type: HttpApi
          Properties:
            Path: /web-admin/organizations/{orgId}/org-admins
            Method: GET
            ApiId: !Ref DalTimeHttpApi
        CreateOrgAdmin:
          Type: HttpApi
          Properties:
            Path: /web-admin/organizations/{orgId}/org-admins
            Method: POST
            ApiId: !Ref DalTimeHttpApi
        DisableOrgAdmin:
          Type: HttpApi
          Properties:
            Path: /web-admin/organizations/{orgId}/org-admins/{userId}
            Method: DELETE
            ApiId: !Ref DalTimeHttpApi
        OptionsOrgAdmins:
          Type: HttpApi
          Properties:
            Path: /web-admin/organizations/{orgId}/org-admins
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        OptionsOrgAdminById:
          Type: HttpApi
          Properties:
            Path: /web-admin/organizations/{orgId}/org-admins/{userId}
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          USER_POOL_ID: !Ref CognitoUserPoolId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DalTimeTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminGetUser
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/web-admin/org-admins/handler.ts
        Format: esm
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        External:
          - "@aws-sdk/*"

  ManagersFunction:
    Type: AWS::Serverless::Function
    DependsOn: ManagersFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ManagersFunction"
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AWS::StackName}-ManagersFunction"
      CodeUri: ../backend
      Handler: src/functions/org-admin/managers/handler.handler
      Events:
        ListManagers:
          Type: HttpApi
          Properties:
            Path: /org-admin/managers
            Method: GET
            ApiId: !Ref DalTimeHttpApi
        CreateManager:
          Type: HttpApi
          Properties:
            Path: /org-admin/managers
            Method: POST
            ApiId: !Ref DalTimeHttpApi
        UpdateManager:
          Type: HttpApi
          Properties:
            Path: /org-admin/managers/{managerId}
            Method: PUT
            ApiId: !Ref DalTimeHttpApi
        DisableManager:
          Type: HttpApi
          Properties:
            Path: /org-admin/managers/{managerId}
            Method: DELETE
            ApiId: !Ref DalTimeHttpApi
        OptionsManagers:
          Type: HttpApi
          Properties:
            Path: /org-admin/managers
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        OptionsManagerById:
          Type: HttpApi
          Properties:
            Path: /org-admin/managers/{managerId}
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
      Environment:
        Variables:
          USER_POOL_ID: !Ref CognitoUserPoolId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DalTimeTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminDisableUser
                - cognito-idp:AdminGetUser
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/org-admin/managers/handler.ts
        Format: esm
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        External:
          - "@aws-sdk/*"

  OrganizationsFunction:
    Type: AWS::Serverless::Function
    DependsOn: OrganizationsFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-OrganizationsFunction"
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/${AWS::StackName}-OrganizationsFunction"
      CodeUri: ../backend
      Handler: src/functions/web-admin/organizations/handler.handler
      Events:
        ListOrganizations:
          Type: HttpApi
          Properties:
            Path: /organizations
            Method: GET
            ApiId: !Ref DalTimeHttpApi
        CreateOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations
            Method: POST
            ApiId: !Ref DalTimeHttpApi
        GetOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: GET
            ApiId: !Ref DalTimeHttpApi
        UpdateOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: PUT
            ApiId: !Ref DalTimeHttpApi
        DeleteOrganization:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: DELETE
            ApiId: !Ref DalTimeHttpApi
        OptionsOrganizations:
          Type: HttpApi
          Properties:
            Path: /organizations
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
        OptionsOrganizationById:
          Type: HttpApi
          Properties:
            Path: /organizations/{orgId}
            Method: OPTIONS
            ApiId: !Ref DalTimeHttpApi
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DalTimeTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/functions/web-admin/organizations/handler.ts
        Format: esm
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        External:
          - "@aws-sdk/*"

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${DalTimeHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  OrganizationsEndpoint:
    Value: !Sub "https://${DalTimeHttpApi}.execute-api.${AWS::Region}.amazonaws.com/organizations"
  OrganizationsFunction:
    Value: !GetAtt OrganizationsFunction.Arn
  DalTimeTable:
    Value: !Ref DalTimeTable