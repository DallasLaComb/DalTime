<div class="container-fluid py-3 py-md-4">
  <h2 class="mb-4">Org Admin Dashboard</h2>

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-secondary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  }

  @if (error()) {
    <div class="alert alert-danger" role="alert">{{ error() }}</div>
  }

  @if (!loading() && !error()) {
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">Your Organization</h5>
        <dl class="row mb-0">
          <dt class="col-sm-3">Name</dt>
          <dd class="col-sm-9">{{ org()?.name }}</dd>
          <dt class="col-sm-3">Address</dt>
          <dd class="col-sm-9">{{ org()?.address || '—' }}</dd>
          <dt class="col-sm-3">Org ID</dt>
          <dd class="col-sm-9"><code>{{ org()?.org_id }}</code></dd>
        </dl>
      </div>
    </div>
  }
</div>
