@if (open()) {
  <div class="modal-backdrop fade show"></div>
  <div
    class="modal d-block fade show"
    tabindex="-1"
    data-testid="confirmation-modal"
    (click)="cancel.emit()"
    (keydown)="onKeydown($event)"
    #modalContainer
  >
    <div
      class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down"
      (click)="$event.stopPropagation()"
    >
      <div class="dt-debug modal-content rounded-3 shadow-sm">
        <div class="modal-header">
          <h5 class="modal-title fw-semibold">{{ title() }}</h5>
          <button type="button" class="btn-close" data-testid="confirmation-modal-close" (click)="cancel.emit()"></button>
        </div>
        <div class="modal-body">
          <ng-content></ng-content>
        </div>
        <div class="modal-footer flex-column flex-sm-row">
          <app-button variant="secondary" [fullWidth]="true" testId="confirmation-modal-cancel" (clicked)="cancel.emit()">
            Cancel
          </app-button>
          <button
            class="btn w-100 w-sm-auto"
            [class]="confirmStyle()"
            [disabled]="saving()"
            data-testid="confirmation-modal-confirm"
            (click)="confirm.emit()"
          >
            @if (saving()) {
              <span class="spinner-border spinner-border-sm me-1" role="status"></span>
            }
            {{ confirmLabel() }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
