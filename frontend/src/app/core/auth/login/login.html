<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-4">
      <div class="text-center mb-4">
        <img src="daltime-logo.png" alt="DalTime" height="64" />
        <h2 class="mt-3">Sign In</h2>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          @if (error()) {
            <div class="alert alert-danger py-2" data-testid="login-error">{{ error() }}</div>
          }

          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control form-control-lg"
              id="email"
              data-testid="email-input"
              [class.is-invalid]="submitted() && !email().trim()"
              [value]="email()"
              (input)="email.set($any($event.target).value)"
              placeholder="you@example.com"
              autocomplete="email"
            />
            @if (submitted() && !email().trim()) {
              <div class="invalid-feedback" data-testid="email-error">Email is required</div>
            }
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input
                [type]="showPassword() ? 'text' : 'password'"
                class="form-control form-control-lg"
                id="password"
                data-testid="password-input"
                [class.is-invalid]="submitted() && !password().trim()"
                [value]="password()"
                (input)="password.set($any($event.target).value)"
                (keydown.enter)="onSubmit()"
                placeholder="Password"
                autocomplete="current-password"
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                data-testid="toggle-password-btn"
                (click)="togglePassword()"
              >
                {{ showPassword() ? 'Hide' : 'Show' }}
              </button>
            </div>
            @if (submitted() && !password().trim()) {
              <div class="text-danger small mt-1" data-testid="password-error">Password is required</div>
            }
          </div>

          <app-button variant="primary" size="lg" [fullWidth]="true" [loading]="submitting()" testId="sign-in-btn" (clicked)="onSubmit()">Sign In</app-button>

          <div class="text-center mt-3">
            <a routerLink="/forgot-password" class="text-muted small" data-testid="forgot-password-link">Forgot password?</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
