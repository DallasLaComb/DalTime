<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-8 col-md-6 col-lg-4">
      <div class="text-center mb-4">
        <img src="daltime-logo.png" alt="DalTime" height="64" />
        <h2 class="mt-3">Set New Password</h2>
        <p class="text-muted">Your administrator created your account with a temporary password. Please set a new password to continue.</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          @if (error()) {
            <div class="alert alert-danger py-2" data-testid="change-password-error">{{ error() }}</div>
          }

          <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <div class="input-group">
              <input
                [type]="showPassword() ? 'text' : 'password'"
                class="form-control form-control-lg"
                id="newPassword"
                data-testid="new-password-input"
                [class.is-invalid]="submitted() && !newPassword().trim()"
                [value]="newPassword()"
                (input)="newPassword.set($any($event.target).value)"
                placeholder="New password"
                autocomplete="new-password"
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                data-testid="toggle-password-btn"
                (click)="togglePassword()"
              >
                {{ showPassword() ? 'Hide' : 'Show' }}
              </button>
            </div>
            @if (submitted() && !newPassword().trim()) {
              <div class="text-danger small mt-1" data-testid="new-password-error">New password is required</div>
            }
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              class="form-control form-control-lg"
              id="confirmPassword"
              data-testid="confirm-password-input"
              [class.is-invalid]="passwordsMismatch"
              [value]="confirmPassword()"
              (input)="confirmPassword.set($any($event.target).value)"
              (keydown.enter)="onSubmit()"
              placeholder="Confirm password"
              autocomplete="new-password"
            />
            @if (passwordsMismatch) {
              <div class="invalid-feedback" data-testid="mismatch-error">Passwords do not match</div>
            }
          </div>

          <app-button variant="primary" size="lg" [fullWidth]="true" [loading]="submitting()" testId="set-password-btn" (clicked)="onSubmit()">Set Password</app-button>
        </div>
      </div>
    </div>
  </div>
</div>
